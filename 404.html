<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // GitHub Pages 404 redirect for SPA
      // This script takes the current URL and converts it to a query string
      // so that index.html can restore the correct URL after loading
      var segment_count = window.location.pathname.replace(/\/$|^\//, '').split('/').length;
      window.location.replace('/dragon-boat-game/' + window.location.search + '#' + window.location.hash);
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
